name: CI

# Прогоняется на каждый push и каждый pull request — так же, как я проверял
# проект вручную в процессе разработки, только теперь автоматически.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck & tests
    runs-on: ubuntu-latest

    # Реальный Postgres для интеграционных тестов, а не моки — так же, как
    # тесты гоняются локально (см. backend/tests/).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spotbook
          POSTGRES_PASSWORD: spotbook_ci_pw
          POSTGRES_DB: spotbook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spotbook"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgres://spotbook:spotbook_ci_pw@localhost:5432/spotbook_test
      FRONTEND_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Apply migrations
        run: npm run migrate:up

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Typecheck + build
        run: npm run build
