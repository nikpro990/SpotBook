services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - spotbook_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: 4000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      SMS_GATEWAY_URL: ${SMS_GATEWAY_URL}
      SMS_GATEWAY_API_KEY: ${SMS_GATEWAY_API_KEY}
    ports:
      - "4000:4000"
    # Миграции (npm run migrate:up) применяются автоматически при старте
    # контейнера — см. CMD в backend/Dockerfile.

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: http://backend:4000
    ports:
      - "5173:5173"

volumes:
  spotbook_db_data:
